/* ===== LOGIN ===== */

.login-wrapper{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-container{
width:420px;
background:white;
padding:50px 40px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.08);
text-align:center;
}

.logo{width:120px;margin-bottom:20px;}

.title{font-size:24px;font-weight:600;margin-bottom:35px;color:#1e2a38;}

.input-group{margin-bottom:20px;text-align:left;}

.input-group label{font-size:14px;font-weight:500;color:#555;display:block;margin-bottom:8px;}

.input-group input{
width:100%;
padding:14px 18px;
border-radius:12px;
border:1px solid #ddd;
background:#f9fafb;
font-size:15px;
}

.input-group input:focus{
outline:none;
border-color:#1e2a38;
background:white;
}

.login-btn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#1e2a38;
color:white;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

.login-btn:hover{background:#2c3e50;}

.error{color:#e74c3c;margin-top:15px;font-size:14px;}

/* ===== MAIN SYSTEM ===== */

#mainSystem{display:none;}

.sidebar{
position:fixed;
width:240px;
height:100vh;
background:white;
border-right:1px solid #eee;

}

.sidebar-header{text-align:center;margin-bottom:30px;}

.sidebar-header img{width:70px;margin-bottom:10px;}

.sidebar-header h3{font-size:16px;font-weight:600;color:#1e2a38;}

.sidebar a{
display:block;
padding:12px;
margin-bottom:10px;
border-radius:8px;
color:#444;
cursor:pointer;
transition:0.2s;
}

.sidebar a:hover{background:#f4f6f9;padding-left:18px;}

.logout-btn{

width:100%;
padding:10px;
border:none;
border-radius:8px;
