<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - ระบบส่งงาน</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); font-family: 'Kanit', sans-serif; height: 100vh; display: flex; align-items: center; }
        .login-card { background: white; border-radius: 20px; padding: 40px; width: 100%; max-width: 380px; margin: auto; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .form-control { border-radius: 10px; padding: 12px; margin-bottom: 20px; }
        .btn-login { background: #4e73df; color: white; border: none; border-radius: 10px; padding: 12px; width: 100%; font-weight: 500; }
        /* สไตล์เพิ่มเติมสำหรับโลโก้ */
        .logo-img { max-width: 150px; height: auto; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="login-card text-center">
   <img src="logo.png" alt="โลโก้ระบบ" class="logo-img">
    <div class="mb-4">
        <h4 class="fw-bold">เข้าสู่ระบบส่งงาน</h4>
        <p class="text-muted small">กรุณากรอกชื่อผู้ใช้และรหัสผ่าน</p>
    </div>

    <form id="loginForm" class="text-start">
        <label class="form-label small">ชื่อผู้ใช้งาน (Username)</label>
        <input type="text" id="user" class="form-control" required>

        <div class="d-flex justify-content-between">
            <label class="form-label small">รหัสผ่าน</label>
            <a href="forgot.html" class="small text-decoration-none">ลืมรหัสผ่าน?</a>
        </div>
        <input type="password" id="pass" class="form-control" required>

        <button type="submit" class="btn btn-login">เข้าสู่ระบบ</button>
    </form>

    <div class="text-center mt-4">
        <span class="small">ยังไม่มีบัญชี? <a href="register.html" class="text-decoration-none">สมัครสมาชิก</a></span>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const username = document.getElementById('user').value;
        const password = document.getElementById('pass').value;

        // ดึงข้อมูลจาก localStorage
        const storedData = localStorage.getItem('user_' + username);

        if (storedData) {
            const user = JSON.parse(storedData);
            if (user.password === password) {
                
                // บันทึกข้อมูลผู้ใช้ที่ล็อคอินสำเร็จลงใน 'currentUser' 
                localStorage.setItem('currentUser', JSON.stringify(user));

                Swal.fire({
                    title: 'เข้าสู่ระบบสำเร็จ',
                    text: 'สวัสดีคุณ ' + user.fname,
                    icon: 'success',
                    timer: 1500,
                    showConfirmButton: false
                }).then(() => {
                    // เช็คว่าเป็นครูหรือนักเรียนแล้วส่งไปหน้าตามนั้น
                    window.location.href = (user.role === 'teacher') ? 'teacher.html' : 'student.html';
                });
            } else {
                Swal.fire('รหัสผ่านผิด', 'กรุณาลองใหม่อีกครั้ง', 'error');
            }
        } else {
            Swal.fire('ไม่พบผู้ใช้งาน', 'กรุณาสมัครสมาชิกก่อน', 'warning');
        }
    });
</script>

</body>
</html>
