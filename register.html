<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สมัครสมาชิก - ระบบส่งงาน</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background-color: #f8fafc; font-family: 'Kanit', sans-serif; display: flex; align-items: center; min-height: 100vh; margin: 0; }
        .reg-card { background: #fff; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding: 30px; width: 100%; max-width: 450px; margin: auto; }
        .nav-pills .nav-link { border-radius: 10px; color: #6c757d; font-weight: 500; }
        .nav-pills .nav-link.active { background-color: #2dce89; color: white; }
        .form-control { border-radius: 10px; padding: 10px; margin-bottom: 15px; }
        .btn-reg { background: #2dce89; color: white; border: none; border-radius: 10px; padding: 12px; width: 100%; font-weight: 500; }
    </style>
</head>
<body>

<div class="reg-card">
    <h3 class="text-center fw-bold mb-4">สมัครสมาชิกใหม่</h3>
    
    <ul class="nav nav-pills nav-fill mb-4" id="regTab">
        <li class="nav-item">
            <button class="nav-link active" onclick="switchForm('student')">นักเรียน</button>
        </li>
        <li class="nav-item">
            <button class="nav-link" onclick="switchForm('teacher')">คุณครู</button>
        </li>
    </ul>

    <form id="mainForm">
        <div class="row">
            <div class="col-6">
                <label class="form-label small">ชื่อ</label>
                <input type="text" id="fname" class="form-control" required>
            </div>
            <div class="col-6">
                <label class="form-label small">นามสกุล</label>
                <input type="text" id="lname" class="form-control" required>
            </div>
        </div>

        <label class="form-label small">รหัสประจำตัว</label>
        <input type="text" id="idCode" class="form-control" required>

        <div id="studentFields">
            <div class="row">
                <div class="col-6">
                    <label class="form-label small">ชั้น (เช่น ม.1/1)</label>
                    <input type="text" id="grade" class="form-control">
                </div>
                <div class="col-6">
                    <label class="form-label small">เลขที่</label>
                    <input type="number" id="no" class="form-control">
                </div>
            </div>
        </div>

        <hr>
        <label class="form-label small text-primary">ตั้งชื่อผู้ใช้งาน (Username)</label>
        <input type="text" id="username" class="form-control" required>

        <label class="form-label small text-primary">ตั้งรหัสผ่าน</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••" required>

        <button type="submit" class="btn btn-reg mt-2">ยืนยันการสมัคร</button>
    </form>

    <div class="text-center mt-3">
        <a href="index.html" class="small text-decoration-none text-muted">กลับไปหน้าล็อคอิน</a>
    </div>
</div>

<script>
    let currentRole = 'student';

    function switchForm(role) {
        currentRole = role;
        const studentFields = document.getElementById('studentFields');
        const btns = document.querySelectorAll('.nav-link');
        
        if(role === 'teacher') {
            studentFields.style.display = 'none';
            btns[0].classList.remove('active');
            btns[1].classList.add('active');
        } else {
            studentFields.style.display = 'block';
            btns[0].classList.add('active');
            btns[1].classList.remove('active');
        }
    }

   document.getElementById('mainForm').addEventListener('submit', function(e) {
    e.preventDefault();

    // 1. สร้างก้อนข้อมูลของผู้ใช้คนใหม่
    const newUser = {
        role: currentRole,
        fname: document.getElementById('fname').value,
        lname: document.getElementById('lname').value,
        idCode: document.getElementById('idCode').value,
        grade: currentRole === 'student' ? document.getElementById('grade').value : '-',
        no: currentRole === 'student' ? document.getElementById('no').value : '-',
        username: document.getElementById('username').value,
        password: document.getElementById('password').value,
        // เพิ่มช่องคะแนนเริ่มต้นไว้เลย ข้อมูลจะได้ไม่พังเวลาครูเปิดดู
        keep: 0,
        mid: 0,
        final: 0
    };

    // 2. ดึงข้อมูล "users" ทั้งหมดที่มีอยู่เดิมออกมา (ถ้าไม่มีให้เป็น Array ว่าง [])
    let allUsers = JSON.parse(localStorage.getItem('users')) || [];

    // 3. ตรวจสอบว่า Username ซ้ำไหม
    const isExist = allUsers.some(user => user.username === newUser.username);
    if (isExist) {
        Swal.fire('ข้อผิดพลาด', 'Username นี้มีผู้ใช้แล้ว', 'error');
        return;
    }

    // 4. เพิ่มคนใหม่เข้าไปใน Array "users"
    allUsers.push(newUser);

    // 5. บันทึกกลับลงไปที่ Key "users" (Key นี้คือหัวใจหลักที่ใช้เชื่อมทุกหน้า)
    localStorage.setItem('users', JSON.stringify(allUsers));

    // (ส่วนเสริม) ยังเก็บแยกรายคนไว้ด้วยเผื่อระบบเดิมของคุณเรียกใช้
    localStorage.setItem('user_' + newUser.username, JSON.stringify(newUser));

    Swal.fire({
        title: 'สมัครสำเร็จ!',
        text: 'ยินดีต้อนรับ ' + newUser.fname,
        icon: 'success',
        confirmButtonColor: '#2dce89'
    }).then(() => {
        window.location.href = 'index.html';
    });
});

</script>

</body>
</html>
